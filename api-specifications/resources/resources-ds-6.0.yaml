      Information about the association between the educator candidate and the
      educator preparation program.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: candidateIdentificationCodes
    description: This entity holds different identity codes for a candidate.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: candidateRelationshipToStaffAssociations
    description: >-
      Describes the relationship between a  current candidate and a staff
      person, typically at a K12 partnering district in the role of a mentor
      teacher, coordinating teacher, supervising principal, etc. It could also
      describe the relationship between a  current candidate and a university
      staff member. This is a relationship between two different people
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: candidates
    description: >-
      A candidate is both a person enrolled in a educator preparation program
      and a candidate to become an educator.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: certificationExamResults
    description: The person's result from taking a certification exam.
    x-Ed-Fi-domains:
      - Credential
  - name: certificationExams
    description: An examination required by one or more certifications.
    x-Ed-Fi-domains:
      - Credential
  - name: certifications
    description: >-
      An offering by an official granting authority of a certification or
      license that qualifies persons to perform specific job functions, such as
      fulfill a teaching assignment.
    x-Ed-Fi-domains:
      - Credential
  - name: chartOfAccounts
    description: >-
