  /ed-fi/applicantProfiles:
    get:
      tags:
        - applicantProfiles
      summary: >-
        Retrieves specific resources using the resource's property values (using
        the "Get" pattern).
      description: >-
        This GET operation provides access to resources using the "Get" search
        pattern.  The values of any properties of the resource that are
        specified will be used to return all matching results (if it exists).
      operationId: getApplicantProfiles
      parameters:
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/totalCount'
        - name: applicantProfileIdentifier
          in: query
          description: >-
            Identifier assigned to a person making formal application for
            entrance into a program or an open staff position.
          schema:
            maxLength: 32
            type: string
          x-Ed-Fi-isIdentity: true
        - name: citizenshipStatusDescriptor
          in: query
          description: An indicator of whether or not the person is a U.S. citizen.
          schema:
            maxLength: 306
            type: string
        - name: economicDisadvantageDescriptor
          in: query
          description: >-
            An indication of inadequate financial condition of an individual's
            family, as determined by family income, number of family
            members/dependents, participation in public assistance programs,
            and/or other characteristics considered relevant by federal, state,
            and local policy.
          schema:
            maxLength: 306
            type: string
        - name: highestCompletedLevelOfEducationDescriptor
          in: query
          description: The extent of formal instruction an individual has received.
          schema:
            maxLength: 306
            type: string
        - name: sexDescriptor
          in: query
          description: A person's birth sex.
          schema:
            maxLength: 306
            type: string
        - name: birthDate
          in: query
          description: The month, day, and year on which an individual was born.
          schema:
            type: string
            format: date
        - name: firstGenerationStudent
          in: query
          description: >-
            Indicator of whether individual is a first generation college
            student.
          schema:
            type: boolean
        - name: firstName
          in: query
          description: >-
            A name given to an individual at birth, baptism, or during another
            naming ceremony, or through legal change.
          schema:
            maxLength: 75
            type: string
        - name: genderIdentity
          in: query
          description: The gender the person identifies themselves as.
          schema:
            maxLength: 60
            type: string
        - name: generationCodeSuffix
          in: query
          description: >-
            An appendage, if any, used to denote an individual's generation in
            his family (e.g., Jr., Sr., III).
          schema:
            maxLength: 10
            type: string
        - name: highlyQualifiedTeacher
          in: query
          description: >-
            An indication of whether a teacher is classified as highly qualified
            for his/her assignment according to state definition. This attribute
            indicates the teacher is highly qualified for all sections being
            taught.
          schema:
            type: boolean
        - name: hispanicLatinoEthnicity
          in: query
          description: >-
            An indication that the individual traces his or her origin or
            descent to Mexico, Puerto Rico, Cuba, Central, and South America,
            and other Spanish cultures, regardless of race. The term, "Spanish
            origin," can be used in addition to "Hispanic or Latino".
          schema:
            type: boolean
          x-Ed-Fi-isDeprecated: true
          x-Ed-Fi-deprecatedReasons: >-
            This element is scheduled for removal by 2029. Users of this element
            are advised to use Race instead.
        - name: id
          in: query
          description: ''
          schema:
            type: string
        - name: lastSurname
          in: query
          description: The name borne in common by members of a family.
          schema:
            maxLength: 75
            type: string
        - name: maidenName
          in: query
          description: The individual's maiden name.
          schema:
            maxLength: 75
            type: string
        - name: middleName
          in: query
          description: >-
            A secondary name given to an individual at birth, baptism, or during
            another naming ceremony.
          schema:
            maxLength: 75
            type: string
        - name: personalTitlePrefix
          in: query
          description: >-
            A prefix used to denote the title, degree, position, or seniority of
            the individual.
          schema:
            maxLength: 30
            type: string
        - name: preferredFirstName
          in: query
          description: >-
