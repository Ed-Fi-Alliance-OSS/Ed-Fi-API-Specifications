            daily, ongoing medical treatments and monitoring by appropriately
            trained personnel which may include parents or other family members,
            and 3) requires the routine use of medical device or of assistive
            technology to compensate for the loss of usefulness of a body
            function needed to participate in activities of daily living, and 4)
