      subject. This can be prescribed by academic research, an interventions
      vendor, or another entity.
    x-Ed-Fi-domains:
      - Intervention
  - name: interventions
    description: >-
      An implementation of an instructional approach focusing on the specific
      techniques and materials used to teach a given subject.
    x-Ed-Fi-domains:
      - Intervention
      - StudentCohort
  - name: interventionStudies
    description: An experimental or quasi-experimental study of an intervention technique.
    x-Ed-Fi-domains:
      - Intervention
  - name: learningStandardEquivalenceAssociations
