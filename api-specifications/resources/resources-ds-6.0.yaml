      particular field of study that typically involves a prescribed number,
      instruction periods, or meetings for enrolled students.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: fieldworkExperienceSectionAssociations
    description: Associates field work experience with a section.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: financialAids
    description: This entity represents the financial aid a person is awarded.
    x-Ed-Fi-domains:
      - Enrollment
  - name: functionDimensions
    description: >-
      The NCES function accounting dimension representing an expenditure. The
      function describes the activity for which a service or material object is
      acquired. The functions of a school district are generally classified into
      five broad areas, including instruction, support services, operation of
      non-instructional services, facilities acquisition and construction, and
      debt service.
    x-Ed-Fi-domains:
      - Finance
  - name: fundDimensions
    description: >-
      The NCES fund accounting dimension. A fund is a fiscal and accounting
      entity with a self-balancing set of accounts recording cash and other
      financial resources, together with all related liabilities and residual
      equities or balances, and changes therein, which are segregated for the
      purpose of carrying on specific activities or attaining certain objectives
      in accordance with special regulations, restrictions, or limitations.
    x-Ed-Fi-domains:
      - Finance
  - name: goals
    description: >-
      The goal for performance improvement assigned to an educator associated
      with an evaluation element.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: gradebookEntries
