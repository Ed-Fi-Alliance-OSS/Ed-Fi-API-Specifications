            offering provided for the instruction of students.
          schema:
            maxLength: 60
            type: string
          x-Ed-Fi-isIdentity: true
        - name: schoolId
          in: query
          description: >-
            The identifier assigned to a school. It must be distinct from any
            other identifier assigned to educational organizations, such as a
            LocalEducationAgencyId, to prevent duplication.
          schema:
            type: integer
            format: int64
          x-Ed-Fi-isIdentity: true
        - name: schoolYear
          in: query
          description: The identifier for the school year.
          schema:
            type: integer
            format: int32
          x-Ed-Fi-isIdentity: true
        - name: sectionIdentifier
          in: query
          description: The local identifier assigned to a section.
          schema:
            maxLength: 255
            type: string
          x-Ed-Fi-isIdentity: true
        - name: sessionName
          in: query
          description: The identifier for the calendar for the academic session.
          schema:
            maxLength: 120
            type: string
          x-Ed-Fi-isIdentity: true
        - name: staffUniqueId
          in: query
          description: A unique alphanumeric code assigned to a staff.
          schema:
            maxLength: 32
            type: string
          x-Ed-Fi-isIdentity: true
        - name: classroomPositionDescriptor
          in: query
          description: >-
            The type of position the staff member holds in the specific
            class/section.
          schema:
            maxLength: 306
            type: string
        - name: endDate
          in: query
          description: >-
            Month, day, and year of the last day of a staff member's assignment
            to the section.  Note: Date interpretation may vary. Ed-Fi
            recommends inclusive dates, but states may define dates as inclusive
            or exclusive. For calculations, align with local guidelines.
          schema:
            type: string
            format: date
        - name: highlyQualifiedTeacher
          in: query
          description: >-
            An indication of whether a teacher is classified as highly qualified
            for his/her assignment according to state definition. This attribute
            indicates the teacher is highly qualified for this section being
            taught.
          schema:
            type: boolean
        - name: id
          in: query
          description: ''
          schema:
            type: string
        - name: percentageContribution
          in: query
          description: >-
