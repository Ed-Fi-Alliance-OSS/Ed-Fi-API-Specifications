      This educational entity represents an overall score or assessment tied to
      a course over a period of time (i.e., the grading period). Student grades
      are usually a compilation of marks and other scores.
    x-Ed-Fi-domains:
      - StudentAcademicRecord
      - ReportCard
  - name: gradingPeriods
    description: This entity represents the time span for which grades are reported.
    x-Ed-Fi-domains:
      - SchoolCalendar
      - StudentAcademicRecord
      - ReportCard
  - name: graduationPlans
