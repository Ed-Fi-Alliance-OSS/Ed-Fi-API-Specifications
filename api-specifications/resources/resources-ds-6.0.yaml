components:
  schemas:
    edFi_academicWeek:
      required:
        - weekIdentifier
        - beginDate
        - endDate
        - totalInstructionalDays
        - schoolReference
      type: object
      properties:
        id:
          type: string
          description: ''
        weekIdentifier:
          maxLength: 80
          minLength: 5
          type: string
          description: The school label for the week.
          x-Ed-Fi-isIdentity: true
        schoolReference:
          $ref: '#/components/schemas/edFi_schoolReference'
        beginDate:
          type: string
          description: >-
            The start date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          format: date
        endDate:
          type: string
          description: >-
            The end date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          format: date
        totalInstructionalDays:
          minimum: 0
          type: integer
          description: The total instructional days during the academic week.
          format: int32
        _etag:
          type: string
          description: >-
            A unique system-generated value that identifies the version of the
            resource.
        _lastModifiedDate:
          type: string
          description: The date and time the resource was last modified.
          format: date-time
      x-Ed-Fi-domains:
        - SchoolCalendar
    edFi_academicWeekReference:
      required:
        - schoolId
        - weekIdentifier
      type: object
      properties:
        schoolId:
          type: integer
          description: >-
            The identifier assigned to a school. It must be distinct from any
            other identifier assigned to educational organizations, such as a
            LocalEducationAgencyId, to prevent duplication.
          format: int64
          x-Ed-Fi-isIdentity: true
        weekIdentifier:
          maxLength: 80
          minLength: 5
          type: string
          description: The school label for the week.
          x-Ed-Fi-isIdentity: true
        link:
          $ref: '#/components/schemas/link'
    edFi_accountabilityRating:
      required:
        - ratingTitle
        - rating
        - educationOrganizationReference
        - schoolYearTypeReference
      type: object
      properties:
        id:
          type: string
          description: ''
        ratingTitle:
          maxLength: 60
          type: string
          description: The title of the rating.
          x-Ed-Fi-isIdentity: true
        educationOrganizationReference:
          $ref: '#/components/schemas/edFi_educationOrganizationReference'
        schoolYearTypeReference:
          $ref: '#/components/schemas/edFi_schoolYearTypeReference'
        rating:
          maxLength: 35
          type: string
          description: An accountability rating level, designation, or assessment.
        ratingDate:
          type: string
          description: The date the rating was awarded.
          format: date
          x-nullable: true
        ratingOrganization:
          maxLength: 35
          type: string
          description: The organization that assessed the rating.
          x-nullable: true
        ratingProgram:
          maxLength: 30
          type: string
          description: >-
            The program associated with the accountability rating (e.g., NCLB,
            AEIS).
          x-nullable: true
        _etag:
          type: string
          description: >-
            A unique system-generated value that identifies the version of the
            resource.
        _lastModifiedDate:
          type: string
          description: The date and time the resource was last modified.
          format: date-time
      x-Ed-Fi-domains:
        - EducationOrganization
        - Enrollment
    edFi_applicantProfile:
      required:
        - applicantProfileIdentifier
        - firstName
        - lastSurname
      type: object
      properties:
        id:
          type: string
          description: ''
        applicantProfileIdentifier:
          maxLength: 32
          minLength: 1
          type: string
          description: >-
            Identifier assigned to a person making formal application for
            entrance into a program or an open staff position.
          x-Ed-Fi-isIdentity: true
        addresses:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileAddress'
          description: >-
            An unordered collection of applicantProfileAddresses. The set of
            elements that describes an address, including the street address,
            city, state, and ZIP code.
        applicantCharacteristics:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileApplicantCharacteristic'
          description: >-
            An unordered collection of applicantProfileApplicantCharacteristics.
            Reflects important characteristics of the applicant's home
            situation.
        backgroundChecks:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileBackgroundCheck'
          description: >-
            An unordered collection of applicantProfileBackgroundChecks.
            Applicant background check history and disposition.
        birthDate:
          type: string
          description: The month, day, and year on which an individual was born.
          format: date
          x-nullable: true
        citizenshipStatusDescriptor:
          maxLength: 306
          type: string
          description: An indicator of whether or not the person is a U.S. citizen.
          x-nullable: true
        disabilities:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileDisability'
          description: >-
            An unordered collection of applicantProfileDisabilities. The
            disability condition(s) that best describes an individual's
            impairment.
        economicDisadvantageDescriptor:
          maxLength: 306
          type: string
          description: >-
            An indication of inadequate financial condition of an individual's
            family, as determined by family income, number of family
            members/dependents, participation in public assistance programs,
            and/or other characteristics considered relevant by federal, state,
            and local policy.
          x-nullable: true
        educatorPreparationProgramNames:
          type: array
          items:
            $ref: >-
              #/components/schemas/edFi_applicantProfileEducatorPreparationProgramName
          description: >-
            An unordered collection of
            applicantProfileEducatorPreparationProgramNames. The teacher
            preparation program(s) completed by the teacher.
        electronicMails:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileElectronicMail'
          description: >-
            An unordered collection of applicantProfileElectronicMails. The
            numbers, letters, and symbols used to identify an electronic mail
            (e-mail) user within the network to which the individual or
            organization belongs.
        firstGenerationStudent:
          type: boolean
          description: >-
            Indicator of whether individual is a first generation college
            student.
          x-nullable: true
        firstName:
          maxLength: 75
          type: string
          description: >-
            A name given to an individual at birth, baptism, or during another
            naming ceremony, or through legal change.
        genderIdentity:
          maxLength: 60
          type: string
          description: The gender the person identifies themselves as.
          x-nullable: true
        generationCodeSuffix:
          maxLength: 10
          type: string
          description: >-
            An appendage, if any, used to denote an individual's generation in
            his family (e.g., Jr., Sr., III).
          x-nullable: true
        gradePointAverages:
          type: array
          items:
            $ref: '#/components/schemas/edFi_applicantProfileGradePointAverage'
          description: >-
            An unordered collection of applicantProfileGradePointAverages. Data
            that provides information on a measure of average performance in a
            group of courses taken by an individual.
        highestCompletedLevelOfEducationDescriptor:
          maxLength: 306
          type: string
          description: The extent of formal instruction an individual has received.
          x-nullable: true
        highlyQualifiedAcademicSubjects:
          type: array
          items:
            $ref: >-
              #/components/schemas/edFi_applicantProfileHighlyQualifiedAcademicSubject
          description: >-
            An unordered collection of
            applicantProfileHighlyQualifiedAcademicSubjects. The academic
            subject(s) in which the staff is deemed to be "highly qualified".
        highlyQualifiedTeacher:
          type: boolean
          description: >-
            An indication of whether a teacher is classified as highly qualified
            for his/her assignment according to state definition. This attribute
            indicates the teacher is highly qualified for all sections being
            taught.
          x-nullable: true
        hispanicLatinoEthnicity:
          type: boolean
