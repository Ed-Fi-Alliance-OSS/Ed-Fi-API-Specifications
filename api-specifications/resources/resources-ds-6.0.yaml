    x-Ed-Fi-domains:
      - StudentIdentificationAndDemographics
      - Survey
  - name: courseOfferings
    description: >-
      This entity represents an entry in the course catalog of available courses
      offered by the school during a session.
    x-Ed-Fi-domains:
      - StudentAcademicRecord
      - TeachingAndLearning
      - CourseCatalog
      - SectionsAndPrograms
  - name: courses
    description: >-
      This educational entity represents the organization of subject matter and
      related learning experiences provided for the instruction of students on a
      regular or systematic basis.
    x-Ed-Fi-domains:
      - StudentAcademicRecord
      - Survey
      - TeachingAndLearning
      - CourseCatalog
      - Gradebook
      - SectionsAndPrograms
      - StudentTranscript
  - name: courseTranscripts
    description: >-
      This entity is the final record of a student's performance in their
      courses at the end of a semester or school year.
    x-Ed-Fi-domains:
      - StudentAcademicRecord
      - TeachingAndLearning
      - SectionsAndPrograms
      - StudentTranscript
  - name: credentialEvents
    description: An event associated with a person's credential.
    x-Ed-Fi-domains:
      - Credential
  - name: credentials
    description: >-
      The legal document giving authorization to perform teaching assignment
      services.
    x-Ed-Fi-domains:
      - Credential
      - Staff
  - name: crisisEvents
    description: >-
      A natural or man-made event that causes the disruption of school-level
      activities and the temporary or permanent displacement of students.
    x-Ed-Fi-domains:
      - Enrollment
  - name: descriptorMappings
    description: >-
      A mapping of a descriptor value in one namespace to a descriptor value in
      another namespace. This can be used to exchange known contextual mappings
      of enumeration values.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: disciplineActions
    description: >-
      This event entity represents actions taken by an education organization
      after a disruptive event that is recorded as a discipline incident.
    x-Ed-Fi-domains:
      - Discipline
  - name: disciplineIncidents
    description: >-
      This event entity represents an occurrence of an infraction ranging from a
      minor behavioral problem that disrupts the orderly functioning of a school
      or classroom (such as tardiness) to a criminal act that results in the
      involvement of a law enforcement official (such as robbery). A single
      event (e.g., a fight) is one incident regardless of how many perpetrators
      or victims are involved. Discipline incidents are events classified as
      warranting discipline action.
    x-Ed-Fi-domains:
      - Discipline
  - name: educationContents
    description: >-
      This entity represents materials for students or teachers that can be used
      for teaching, learning, research, and more. Education content includes
      full courses, course materials, modules, intervention descriptions,
      textbooks, streaming videos, tests, software, and any other tools,
      materials, or techniques used to support access to knowledge.
    x-Ed-Fi-domains:
      - Intervention
  - name: educationOrganizationIdentificationCodes
    description: This entity holds different identity codes for an education organization.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: educationOrganizationInterventionPrescriptionAssociations
    description: >-
      This association indicates interventions made available by an education
      organization. Often, a district-level education organization purchases a
      set of intervention prescriptions and makes them available to its schools
      for use on demand.
    x-Ed-Fi-domains:
      - Intervention
  - name: educationOrganizationNetworkAssociations
    description: >-
      Properties of the association between the education organization and its
      network(s).
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: educationOrganizationNetworks
    description: >-
      This entity is a self-organized membership network of peer-level education
      organizations intended to provide shared services or collective
      procurement.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: educationOrganizationPeerAssociations
    description: The association from an education organization to its peers.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: educationServiceCenters
    description: >-
      This entity represents a regional, multi-services public agency authorized
      by state law to develop, manage and provide services, programs, or other
      support options (e.g., construction, food services, and technology
      services) to LEAs.
    x-Ed-Fi-domains:
      - EducationOrganization
      - Staff
  - name: educatorPreparationPrograms
    description: >-
      The educator preparation program designed to prepare students to become
      licensed educators.
    x-Ed-Fi-domains:
      - EducatorPreparationProgram
  - name: evaluationElementRatings
    description: >-
      The lowest-level rating for an evaluation element for an individual
      educator.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: evaluationElements
    description: >-
      The lowest-level elements or criterion of performance being evaluated by
      rubric, quantitative measure, or aggregate survey response.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: evaluationObjectiveRatings
    description: >-
      The rating for the component evaluation objective for an individual
      educator.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: evaluationObjectives
    description: >-
      A sub-component of an evaluation, a specific educator objective or domain
      of performance that is being evaluated.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: evaluationRatings
    description: >-
      The summary weighting for the evaluation instrument for an individual
      educator.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: evaluationRubricDimensions
    description: >-
      The cells of a rubric, consisting of a qualitative description,
      definition, or exemplar with the associated rubric evaluation level.
    x-Ed-Fi-domains:
      - TeachingAndLearning
      - StudentProgramEvaluation
  - name: evaluations
    description: >-
      An evaluation instrument applied to evaluate an educator.  The evaluation
      could be internally developed, or could be an industry recognized
      instrument such as TTESS or Marzano.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: feederSchoolAssociations
    description: The association from feeder school to the receiving school.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: fieldworkExperiences
