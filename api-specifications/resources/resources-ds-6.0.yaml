              #/components/schemas/edFi_studentMigrantEducationProgramAssociationMigrantEducationProgramService
          description: >-
            An unordered collection of
            studentMigrantEducationProgramAssociationMigrantEducationProgramServices.
            Indicates the service(s) being provided to the student by the
            migrant education program.
        priorityForServices:
          type: boolean
          description: >-
            Report migratory children who are classified as having "priority for
            services" because they are failing, or most at risk of failing to
            meet the state's challenging state academic content standards and
            challenging state student academic achievement standards, and their
            education has been interrupted during the regular school year.
        programParticipationStatuses:
          type: array
          items:
            $ref: >-
              #/components/schemas/edFi_generalStudentProgramAssociationProgramParticipationStatus
          description: >-
            An unordered collection of
            generalStudentProgramAssociationProgramParticipationStatuses. The
            status of the student's program participation.
        qualifyingArrivalDate:
          type: string
          description: >-
            The qualifying arrival date (QAD) is the date the child joins the
            worker who has already moved, or the date when the worker joins the
            child who has already moved. The QAD is the date that the child's
            eligibility for the MEP begins. The QAD is not affected by
            subsequent non-qualifying moves.
          format: date
          x-nullable: true
        reasonExitedDescriptor:
          maxLength: 306
          type: string
          description: The reason the student left the program within a school or district.
