    edFi_contactAddress:
      required:
        - addressTypeDescriptor
        - stateAbbreviationDescriptor
        - city
        - postalCode
        - streetNumberName
      type: object
      properties:
        addressTypeDescriptor:
          maxLength: 306
          type: string
          description: >-
            The type of address listed for an individual or organization.    For
            example:  Physical Address, Mailing Address, Home Address, etc.)
          x-Ed-Fi-isIdentity: true
        stateAbbreviationDescriptor:
          maxLength: 306
          type: string
          description: >-
            The abbreviation for the state (within the United States) or
            outlying area in which an address is located.
          x-Ed-Fi-isIdentity: true
        city:
          maxLength: 30
          minLength: 2
          type: string
          description: The name of the city in which an address is located.
          x-Ed-Fi-isIdentity: true
        postalCode:
          maxLength: 17
          type: string
          description: >-
            The five or nine digit zip code or overseas postal code portion of
            an address.
          x-Ed-Fi-isIdentity: true
        streetNumberName:
          maxLength: 150
          type: string
          description: >-
            The street number and street name or post office box number of an
            address.
          x-Ed-Fi-isIdentity: true
        localeDescriptor:
          maxLength: 306
          type: string
          description: >-
            A general geographic indicator that categorizes U.S. territory
            (e.g., City, Suburban).
          x-nullable: true
        apartmentRoomSuiteNumber:
          maxLength: 50
          type: string
          description: The apartment, room, or suite number of an address.
          x-nullable: true
        buildingSiteNumber:
          maxLength: 20
          type: string
          description: >-
            The number of the building on the site, if more than one building
            shares the same address.
          x-nullable: true
        congressionalDistrict:
          maxLength: 30
          type: string
          description: The congressional district in which an address is located.
          x-nullable: true
        countyFIPSCode:
          maxLength: 5
          minLength: 3
          type: string
          description: >-
            The Federal Information Processing Standards (FIPS) numeric code for
            the county issued by the National Institute of Standards and
            Technology (NIST). Counties are considered to be the "first-order
            subdivisions" of each State and statistically equivalent entity,
            regardless of their local designations (county, parish, borough,
            etc.) Counties in different States will have the same code. A unique
            county number is created when combined with the 2-digit FIPS State
            Code.
          x-nullable: true
        doNotPublishIndicator:
          type: boolean
          description: An indication that the address should not be published.
          x-nullable: true
        latitude:
          maxLength: 20
          type: string
          description: The geographic latitude of the physical address.
          x-nullable: true
        longitude:
          maxLength: 20
          type: string
          description: The geographic longitude of the physical address.
          x-nullable: true
        nameOfCounty:
          maxLength: 30
          type: string
          description: >-
            The name of the county, parish, borough, or comparable unit (within
            a state) in which an address is located.
          x-nullable: true
        periods:
          type: array
          items:
            $ref: '#/components/schemas/edFi_contactAddressPeriod'
          description: >-
            An unordered collection of contactAddressPeriods. The time periods
            for which the address is valid. For physical addresses, the periods
            in which the person lived at that address.
    edFi_contactAddressPeriod:
      required:
        - beginDate
      type: object
      properties:
        beginDate:
          type: string
          description: >-
            The month, day, and year for the start of the period.  Note: Date
            interpretation may vary. Ed-Fi recommends inclusive dates, but
            states may define dates as inclusive or exclusive. For calculations,
            align with local guidelines.
          format: date
          x-Ed-Fi-isIdentity: true
        endDate:
          type: string
          description: >-
            The month, day, and year for the end of the period.  Note: Date
            interpretation may vary. Ed-Fi recommends inclusive dates, but
            states may define dates as inclusive or exclusive. For calculations,
            align with local guidelines.
          format: date
          x-nullable: true
