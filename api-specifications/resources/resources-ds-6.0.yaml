  - name: openStaffPositions
    description: >-
      This entity represents an open staff position that the education
      organization is seeking to fill.
    x-Ed-Fi-domains:
      - Staff
  - name: operationalUnitDimensions
    description: >-
      The NCES operational unit accounting dimension. This dimension is used to
      segregate costs by school and operational unit such as physical location,
      department, or other method.
    x-Ed-Fi-domains:
      - Finance
  - name: organizationDepartments
    description: >-
      An organizational unit of another education organization, often devoted to
      a particular academic discipline, area of study, or organization function.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: pathMilestones
    description: A significant event or achievement as part of a path of study.
    x-Ed-Fi-domains:
      - Path
  - name: pathPhases
    description: A stage in the process of a student achieving milestones.
    x-Ed-Fi-domains:
      - Path
  - name: paths
    description: >-
      A scheme for achieving milestones organized by phases for students to
      follow and be tracked against.
    x-Ed-Fi-domains:
      - Path
  - name: people
    description: This entity represents a human being.
    x-Ed-Fi-domains:
      - Staff
      - StudentIdentificationAndDemographics
  - name: performanceEvaluationRatings
    description: >-
      The summary rating for a performance evaluation across all evaluation
      instruments for an individual educator.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: performanceEvaluations
    description: >-
      A performance evaluation of an educator, typically regularly scheduled and
      uniformly applied, composed of one or more evaluations.
    x-Ed-Fi-domains:
      - PerformanceEvaluation
  - name: postSecondaryEvents
    description: >-
      This entity captures significant post-secondary events during a student's
      high school tenure (e.g., FAFSA application or college application,
      acceptance, and enrollment) or during a student's enrollment at a
      post-secondary institution.
    x-Ed-Fi-domains:
      - Graduation
  - name: postSecondaryInstitutions
    description: >-
      An organization that provides educational programs for individuals who
      have completed or otherwise left educational programs in secondary
      school(s).
    x-Ed-Fi-domains:
      - EducationOrganization
      - Graduation
  - name: professionalDevelopmentEventAttendances
    description: >-
      This event entity represents the recording of whether a staff is in
      attendance for professional development.
    x-Ed-Fi-domains:
      - RecruitingAndStaffing
  - name: professionalDevelopmentEvents
    description: Information about a professional development event.
    x-Ed-Fi-domains:
      - RecruitingAndStaffing
  - name: programDimensions
    description: >-
      The NCES program accounting dimension. A program is defined by the NCES as
      a plan of activities and procedures designed to accomplish a predetermined
      objective or set of objectives. These are often categorized into broad
      program areas such as regular education, special education, vocational
      education, other PK-12 instructional, nonpublic school, adult and
      continuing education, community and junior college education, community
      services, and co-curricular or extracurricular activities.
    x-Ed-Fi-domains:
      - Finance
