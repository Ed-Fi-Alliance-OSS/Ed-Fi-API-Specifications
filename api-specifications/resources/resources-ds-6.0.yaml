          maxLength: 306
          type: string
          description: >-
            Indicates the career cluster or pathway the course is associated
            with as part of a CTE curriculum.
          x-nullable: true
        competencyLevels:
          type: array
          items:
            $ref: '#/components/schemas/edFi_courseCompetencyLevel'
          description: >-
            An unordered collection of courseCompetencyLevels. The competency
            levels defined to rate the student for the course.
        courseDefinedByDescriptor:
          maxLength: 306
          type: string
          description: >-
            Specifies whether the course was defined by the SEA, LEA, School, or
