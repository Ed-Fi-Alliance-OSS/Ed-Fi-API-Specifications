      - SectionsAndPrograms
  - name: objectDimensions
    description: >-
      The NCES object accounting dimension representing an expenditure. Per the
      NCES definition, this classification is used to describe the service or
      commodity obtained as the result of a specific expenditure, such as
      salaries, benefits, tuition reimbursement, and so forth.
    x-Ed-Fi-domains:
