    link:
      type: object
      properties:
        rel:
          type: string
          description: Describes the nature of the relationship to the referenced resource.
        href:
          type: string
          description: The URL to the related resource.
  responses:
    Created:
      description: >-
        The resource was created.  An ETag value is available in the ETag
        header, and the location of the resource is available in the Location
        header of the response.
    Updated:
      description: >-
        The resource was updated.  An updated ETag value is available in the
        ETag header of the response.
    Deleted:
      description: The resource was successfully deleted.
    NotModified:
      description: >-
        The resource's current server-side ETag value matched the If-None-Match
        header value supplied with the request indicating the resource has not
        been modified.
    BadRequest:
      description: >-
        Bad Request. The request was invalid and cannot be completed. See the
        response body for specific validation errors. This will typically be an
        issue with the query parameters or their values.
      content:
        application/json: {}
    Unauthorized:
      description: >-
        Unauthorized. The request requires authentication. The OAuth bearer
        token was either not provided or is invalid. The operation may succeed
        once authentication has been successfully completed.
    Forbidden:
      description: >-
        Forbidden. The request cannot be completed in the current authorization
        context. Contact your administrator if you believe this operation should
        be allowed.
    NotFound:
      description: The resource could not be found.
    NotFoundUseSnapshot:
      description: >-
        The resource could not be found. If Use-Snapshot header is set to true,
        this response can indicate the snapshot may have been removed.
      content:
        application/json: {}
    Conflict:
      description: >-
        Conflict.  The request cannot be completed because it would result in an
        invalid state.  See the response body for details.
      content:
        application/json: {}
    PreconditionFailed:
      description: >-
        The resource's current server-side ETag value does not match the
        supplied If-Match header value in the request. This indicates the
        resource has been modified by another consumer.
    Error:
      description: >-
        An unhandled error occurred on the server. See the response body for
        details.
      content:
        application/json: {}
    Partitions:
      description: The partitions were successfully retrieved.
      content:
        application/json:
          schema:
            type: object
            properties:
              pageTokens:
                type: array
                items:
                  type: string
  parameters:
    offset:
      name: offset
      in: query
      description: Indicates how many items should be skipped before returning results.
      schema:
        type: integer
        format: int32
    limit:
      name: limit
      in: query
      description: >-
        Indicates the maximum number of items that should be returned in the
        results.
      schema:
        maximum: 500
        minimum: 0
        type: integer
        format: int32
        default: 25
    MinChangeVersion:
      name: minChangeVersion
      in: query
      description: Used in synchronization to set sequence minimum ChangeVersion
      schema:
        type: integer
        format: int64
    MaxChangeVersion:
      name: maxChangeVersion
      in: query
      description: Used in synchronization to set sequence maximum ChangeVersion
      schema:
        type: integer
        format: int64
    If-None-Match:
      name: If-None-Match
      in: header
      description: >-
        The previously returned ETag header value, used here to prevent the
        unnecessary data transfer of an unchanged resource.
      schema:
        type: string
    fields:
      name: fields
      in: query
      description: >-
        Specifies a subset of properties that should be returned for each entity
        (e.g. "property1,collection1(collProp1,collProp2)").
      schema:
        type: string
    queryExpression:
      name: q
      in: query
      description: >-
        Specifies a query filter expression for the request. Currently only
        supports range-based queries on dates and numbers (e.g.
        "schoolId:[255901000...255901002]" and
        "BeginDate:[2016-03-07...2016-03-10]").
      schema:
        type: string
    totalCount:
      name: totalCount
      in: query
      description: >-
        Indicates if the total number of items available should be returned in
        the 'Total-Count' header of the response.  If set to false,
        'Total-Count' header will not be provided. Must be false when using
        cursor paging (with pageToken).
      schema:
        type: boolean
        default: false
    pageToken:
      name: pageToken
      in: query
      description: >-
        The token of the page to retrieve, obtained either from the
        "Next-Page-Token" header of the previous request, or from the
        "partitions" endpoint for the resource. Cannot be used with limit/offset
        paging.
      schema:
        type: string
    pageSize:
      name: pageSize
      in: query
      description: >-
        The maximum number of items to retrieve in the page. For use with
        pageToken (cursor paging) only.
      schema:
        minimum: 0
        type: integer
        format: int32
        default: 25
    numberOfPartitions:
      name: number
      in: query
      description: >-
        The number of evenly distributed partitions to provide for client-side
        parallel processing. If unspecified, a reasonable set of partitions will
        be determined based on the total number of accessible items.
      schema:
        maximum: 200
        minimum: 1
        type: integer
        format: int32
  securitySchemes:
    oauth2_client_credentials:
      type: oauth2
      description: Ed-Fi ODS/API OAuth 2.0 Client Credentials Grant Type authorization
      flows:
        clientCredentials:
          tokenUrl: http://localhost:54746/oauth/token
          scopes: {}
security:
  - oauth2_client_credentials: []
tags:
