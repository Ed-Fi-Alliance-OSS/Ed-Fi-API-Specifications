          minimum: -9999999.99
          type: number
          description: >-
            Conversion factor that when multiplied by the number of credits is
            equivalent to Carnegie units.
          format: double
          x-nullable: true
        maximumAvailableCredits:
          maximum: 999999.999
          minimum: 0
          type: number
          description: >-
            The value of credits or units of value awarded for the completion of
            a course.
          format: double
          x-nullable: true
        maximumAvailableCreditTypeDescriptor:
          maxLength: 306
          type: string
          description: >-
            The type of credits or units of value awarded for the completion of
            a course.
          x-nullable: true
        minimumAvailableCreditConversion:
          maximum: 9999999.99
          minimum: -9999999.99
          type: number
          description: >-
            Conversion factor that when multiplied by the number of credits is
            equivalent to Carnegie units.
          format: double
          x-nullable: true
        minimumAvailableCredits:
          maximum: 999999.999
          minimum: 0
          type: number
          description: >-
            The value of credits or units of value awarded for the completion of
