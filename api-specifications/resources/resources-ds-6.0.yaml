openapi: 3.0.4
info:
  title: Ed-Fi Resource API (6.0)
  description: |
    The Ed-Fi Resources API enables applications to read and write education data stored in an Ed-Fi-compatible application through a secure REST interface.
  version: 6.0.0
paths:
  /ed-fi/academicWeeks:
    get:
      tags:
        - academicWeeks
      summary: >-
        Retrieves specific resources using the resource's property values (using
        the "Get" pattern).
      description: >-
        This GET operation provides access to resources using the "Get" search
        pattern.  The values of any properties of the resource that are
        specified will be used to return all matching results (if it exists).
      operationId: getAcademicWeeks
      parameters:
        - $ref: '#/components/parameters/offset'
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/pageToken'
        - $ref: '#/components/parameters/pageSize'
        - $ref: '#/components/parameters/totalCount'
        - name: weekIdentifier
          in: query
          description: The school label for the week.
          schema:
            maxLength: 80
            type: string
          x-Ed-Fi-isIdentity: true
        - name: schoolId
          in: query
          description: >-
            The identifier assigned to a school. It must be distinct from any
            other identifier assigned to educational organizations, such as a
            LocalEducationAgencyId, to prevent duplication.
          schema:
            type: integer
            format: int64
          x-Ed-Fi-isIdentity: true
        - name: beginDate
          in: query
          description: >-
            The start date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: >-
            The end date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          schema:
            type: string
            format: date
        - name: id
          in: query
          description: ''
          schema:
            type: string
        - name: totalInstructionalDays
          in: query
          description: The total instructional days during the academic week.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: The requested resource was successfully retrieved.
          headers:
            Next-Page-Token:
              description: >-
                A token that can be used to retrieve the next contiguous page of
                items. If not present, it indicates that there are no more items
                in the current cursor paging context (which is the current
                partition if the starting token was obtained using the
                partitions endpoint).
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/edFi_academicWeek'
        '304':
          $ref: '#/components/responses/NotModified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    post:
      tags:
        - academicWeeks
      summary: >-
        Creates or updates resources based on the natural key values of the
        supplied resource.
      description: >-
        The POST operation can be used to create or update resources. In
        database terms, this is often referred to as an "upsert" operation
        (insert + update). Clients should NOT include the resource "id" in the
        JSON body because it will result in an error. The web service will
        identify whether the resource already exists based on the natural key
        values provided, and update or create the resource appropriately. It is
        recommended to use POST for both create and update except while updating
        natural key of a resource in which case PUT operation must be used.
      operationId: postAcademicWeek
      requestBody:
        description: >-
          The JSON representation of the "academicWeek" resource to be created
          or updated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edFi_academicWeek'
        required: true
        x-bodyName: academicWeek
      responses:
        '200':
          $ref: '#/components/responses/Updated'
        '201':
          $ref: '#/components/responses/Created'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/Error'
  /ed-fi/academicWeeks/{id}:
    get:
      tags:
        - academicWeeks
      summary: >-
        Retrieves a specific resource using the resource's identifier (using the
        "Get By Id" pattern).
      description: >-
        This GET operation retrieves a resource by the specified resource
        identifier.
      operationId: getAcademicWeeksById
      parameters:
        - name: id
