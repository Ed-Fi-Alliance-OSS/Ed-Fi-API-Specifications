        '304':
          $ref: '#/components/responses/NotModified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Error'
    put:
      tags:
        - academicWeeks
      summary: Updates a resource based on the resource identifier.
      description: >-
        The PUT operation is used to update a resource by identifier. If the
        resource identifier ("id") is provided in the JSON body, it will be
        ignored. Additionally, this API resource is not configured for cascading
        natural key updates. Natural key values for this resource cannot be
        changed using PUT operation, so the recommendation is to use POST as
        that supports upsert behavior.
      operationId: putAcademicWeek
      parameters:
        - name: id
          in: path
          description: A resource identifier that uniquely identifies the resource.
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          description: >-
            The ETag header value used to prevent the PUT from updating a
            resource modified by another consumer.
          schema:
            type: string
      requestBody:
        description: >-
          The JSON representation of the "academicWeek" resource to be created
          or updated.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/edFi_academicWeek'
        required: true
        x-bodyName: academicWeek
      responses:
        '204':
          $ref: '#/components/responses/Updated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - academicWeeks
      summary: Deletes an existing resource using the resource identifier.
      description: >-
        The DELETE operation is used to delete an existing resource by
        identifier. If the resource doesn't exist, an error will result (the
        resource will not be found).
      operationId: deleteAcademicWeekById
      parameters:
        - name: id
          in: path
          description: A resource identifier that uniquely identifies the resource.
          required: true
          schema:
            type: string
        - name: If-Match
          in: header
          description: >-
            The ETag header value used to prevent the DELETE from removing a
            resource modified by another consumer.
          schema:
            type: string
      responses:
        '204':
          $ref: '#/components/responses/Deleted'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '412':
          $ref: '#/components/responses/PreconditionFailed'
        '500':
          $ref: '#/components/responses/Error'
  /ed-fi/academicWeeks/partitions:
    get:
      tags:
        - academicWeeks
      summary: >-
        Retrieves a set of page tokens to be used for efficient client-side
        parallel processing.
      description: >-
        Computes an evenly distributed set of partitions over the accessible
        data and returns a set of page tokens, each representing the first page
        of one of the partitions.
      operationId: getAcademicWeeksPartitions
      parameters:
        - $ref: '#/components/parameters/numberOfPartitions'
        - name: weekIdentifier
          in: query
          description: The school label for the week.
          schema:
            maxLength: 80
            type: string
          x-Ed-Fi-isIdentity: true
        - name: schoolId
          in: query
          description: >-
            The identifier assigned to a school. It must be distinct from any
            other identifier assigned to educational organizations, such as a
            LocalEducationAgencyId, to prevent duplication.
          schema:
            type: integer
            format: int64
          x-Ed-Fi-isIdentity: true
        - name: beginDate
          in: query
          description: >-
            The start date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          description: >-
            The end date for the academic week.  Note: Date interpretation may
            vary. Ed-Fi recommends inclusive dates, but states may define dates
            as inclusive or exclusive. For calculations, align with local
            guidelines.
          schema:
            type: string
            format: date
        - name: id
          in: query
          description: ''
          schema:
            type: string
        - name: totalInstructionalDays
          in: query
          description: The total instructional days during the academic week.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          $ref: '#/components/responses/Partitions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Error'
