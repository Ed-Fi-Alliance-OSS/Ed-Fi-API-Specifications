    x-Ed-Fi-domains:
      - BellSchedule
      - TeachingAndLearning
      - SectionsAndPrograms
  - name: cohorts
    description: >-
      This entity represents any type of list of designated students for
      tracking, analysis, or intervention.
    x-Ed-Fi-domains:
      - Intervention
      - StudentCohort
  - name: communityOrganizations
    description: >-
      This entity represents an administrative unit at the state level which
      exists primarily to operate local community providers.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: communityProviderLicenses
    description: >-
      The legal document held by the community provider that authorizes the
      holder to perform certain functions and or services.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: communityProviders
    description: >-
      This entity represents an educational organization that includes staff and
      students who participate in classes and educational activity groups.
    x-Ed-Fi-domains:
      - EducationOrganization
  - name: competencyObjectives
    description: >-
      This entity holds additional competencies for student achievement that are
      not associated with specific learning objectives (e.g., paying attention
      in class).
    x-Ed-Fi-domains:
      - StudentAcademicRecord
      - ReportCard
  - name: contactIdentificationCodes
    description: This entity holds different identity codes for a contact.
    x-Ed-Fi-domains:
      - StudentIdentificationAndDemographics
  - name: contacts
    description: >-
      This entity represents a contact of a student, such as a parent, guardian
